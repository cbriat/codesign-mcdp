name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the package with dev extras
        run: pip install -e ".[dev]"

      - name: Run the full test suite
        run: python -m pytest tests/ -q

      - name: Run all examples (headless)
        env:
          MPLBACKEND: Agg
        run: |
          set -e
          for m in \
            01_drone \
            02_integer_optimization \
            03_auv_seabed \
            04_uncertain_and_ode \
            05_visualize_kleene \
            06_drone_mcdpl_syntax \
            07_drone_modular \
            08_vehicle_modular \
            09_robotic_arm \
            10_solver_trace \
            11_uncertain_drone \
            12_stochastic_drone \
            13_microgrid \
            14_online_fleet \
            15_bioprocess \
            16_online_doe \
            17_car_codesign \
            18_metabolic_switching \
            19_rover_modules \
            20_sequential_codesign \
            21_reconfigurable_robot \
            22_online_feedback_codesign \
            23_formula1_season \
            24_car_catalog_codesign \
            25_online_paper_benchmarks; do
            echo "=== examples.$m ==="
            python -m "examples.$m"
          done
